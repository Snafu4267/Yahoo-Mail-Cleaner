name: Clean Yahoo Mail Junk

on:
  schedule:
    # Run once a day at 09:00 UTC (05:00 ET / 02:00 PT)
    - cron: '0 9 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  clean_junk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run junk cleaner
        env:
          YAHOO_EMAIL: ${{ secrets.YAHOO_EMAIL }}
          YAHOO_APP_PASSWORD: ${{ secrets.YAHOO_APP_PASSWORD }}
        run: python junk_cleaner.py
